<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨课表(＾∇＾)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png?v=2">

    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --pointer-color: #ff3b30;
            --active-indicator: #007aff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
        }

        /* --- 主界面样式 --- */
        #header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(247, 247, 249, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 20px;
            z-index: 20;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 16px); 
        }
        #header-date { font-size: 14px; color: var(--text-sec); }
        #header-week { font-size: 20px; font-weight: bold; margin-top: 4px; }

        #pointer {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--pointer-color);
            z-index: 10;
            pointer-events: none;
        }
        #pointer::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--pointer-color);
        }

        #timeline {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }
        .time-label {
            position: absolute;
            left: 2%;
            font-size: 12px;
            color: var(--text-sec);
            transform: translateY(-50%);
        }

        /* 课程块优化 */
        .block {
            position: absolute;
            width: 76%;
            left: 17%;
            border-radius: 12px; 
            box-sizing: border-box;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            border: none;
            overflow: hidden; 
        }
        .block::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 12px;
            pointer-events: none;
            z-index: 5;
        }
        .block.active::after {
            box-shadow: inset 4px 0 0 var(--active-indicator);
        }
        
        .block-bg {
            position: absolute;
            width: 100%;
            z-index: 1;
        }
        
        .block-content {
            position: relative;
            z-index: 2;
            padding: 12px 14px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .block-time {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }
        .block-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            color: #2c2c2e;
        }
        .block-loc {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.6);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        /* --- 悬浮按钮 --- */
        #week-view-btn {
            position: fixed;
            bottom: max(30px, env(safe-area-inset-bottom, 30px));
            right: 20px;
            background-color: #ffffff;
            color: #333;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            z-index: 50;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- 学期周历弹窗 --- */
        #week-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #week-modal.show {
            transform: translateY(0);
        }
        .modal-header {
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top, 16px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
        }
        .modal-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: var(--active-indicator);
            padding: 4px 12px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .nav-btn:active { opacity: 0.5; }
        .modal-title { font-size: 18px; font-weight: bold; width: 95px; text-align: center; white-space: nowrap;}
        .close-btn {
            background: #f2f2f7;
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }
        
        /* 网格课表 */
        .modal-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            background: #fcfcfc;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #week-grid {
            display: grid;
            grid-template-columns: 42px repeat(5, 1fr);
            grid-auto-rows: 58px; 
            gap: 4px;
            /* 为滑动预留默认状态 */
            transform: translateX(0);
            opacity: 1;
        }
        .grid-header {
            font-size: 12px;
            color: var(--text-sec);
            text-align: center;
            padding-bottom: 8px;
        }
        .grid-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sec);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }
        .grid-time span {
            font-size: 9px;
            font-weight: 400;
            color: #999;
            margin-top: 2px;
        }
        .grid-course {
            border-radius: 6px;
            padding: 4px;
            color: #333;
            overflow: hidden;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .grid-course-name {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.15;
        }
        .grid-course-loc {
            font-size: 9px;
            color: #555;
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 4px;
            border-radius: 4px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="header-date">加载中...</div>
        <div id="header-week">加载中...</div>
    </div>

    <div id="pointer"></div>
    <div id="timeline"></div>

    <div id="week-view-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        学期周历
    </div>

    <div id="week-modal">
        <div class="modal-header">
            <div class="modal-header-left">
                <button class="nav-btn" id="prev-week-btn">◀</button>
                <div class="modal-title" id="modal-title-text">第 1 周</div>
                <button class="nav-btn" id="next-week-btn">▶</button>
            </div>
            <button class="close-btn" id="close-modal-btn">关闭</button>
        </div>
        <div class="modal-body" id="modal-body-scroll">
            <div id="week-grid"></div>
        </div>
    </div>

<script>
    const SEMESTER_START_DATE = new Date('2026-03-02T00:00:00'); 

    // 配色池与转换功能 
    const pastelColors = ['#eadeeb', '#dceded', '#ebd9e1', '#dae8df', '#f8dfdd', '#fae0d6', '#d6e6dc'];
    const courseColorMap = {};
    let colorIndex = 0;

    function getColor(courseName) {
        if (!courseColorMap[courseName]) {
            courseColorMap[courseName] = pastelColors[colorIndex % pastelColors.length];
            colorIndex++;
        }
        return courseColorMap[courseName];
    }

    function hexToRgba(hex, alpha) {
        let r = parseInt(hex.slice(1, 3), 16),
            g = parseInt(hex.slice(3, 5), 16),
            b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    
    // 标准时间表
    const classTimes = [
        { start: 480, end: 525 },   // 1
        { start: 535, end: 580 },   // 2
        { start: 600, end: 645 },   // 3
        { start: 655, end: 700 },   // 4
        { start: 720, end: 765 },   // 5
        { start: 775, end: 820 },   // 6
        { start: 840, end: 885 },   // 7
        { start: 895, end: 940 },   // 8
        { start: 960, end: 1005 },  // 9
        { start: 1015, end: 1060 }, // 10
        { start: 1080, end: 1125 }, // 11
        { start: 1135, end: 1180 }, // 12
        { start: 1185, end: 1220 }  // 13
    ];

    const range = (start, end) => Array.from({length: end - start + 1}, (_, i) => start + i);

    const schedule = {
        1: [
            { name: "数学分析（荣誉）II", s: 1, e: 2, w: range(1,16), loc: "东下院" },
            { name: "程序设计原理与方法", s: 3, e: 4, w: range(1,16), loc: "中院" },
            { 
                name: "习近平新时代中国特色社会主义思想概论", 
                s: 6, e: 8, // 【关键修复】这里改回8，保证网格周历不与后面的课撞车
                w: range(1,16), 
                loc: "中院",
                customPeriods: [
                    { start: 775, end: 820 },   // 12:55 - 13:40
                    { start: 830, end: 875 },   // 13:50 - 14:35
                    { start: 885, end: 930 }    // 14:45 - 15:30 (修复笔误，原本17:30会连着线性代数一起覆盖)
                ]
            },
            { name: "面向人工智能的线性代数", s: 9, e: 10, w: range(1,8), loc: "上院" }
        ],
        2: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: range(1,16), loc: "中院" },
            { name: "数字电子技术", s: 3, e: 4, w: range(1,8), loc: "上院" },
            { name: "电路理论（荣誉）", s: 7, e: 8, w: range(1,16), loc: "上院" },
            { name: "基础物理实验（荣誉）（1）", s: 11, e: 13, w: range(3,16), loc: "" } 
        ],
        3: [
            { name: "综合英语III", s: 1, e: 2, w: range(1,16), loc: "中院" },
            { name: "数学分析（荣誉）II", s: 3, e: 4, w: range(1,16), loc: "东下院" },
            { name: "形势与政策", s: 9, e: 10, w: [5, 9, 13, 15], loc: "东中院" }, 
            { name: "程序设计原理与方法", s: 11, e: 12, w: range(1,16), loc: "中院" }
        ],
        4: [
            { name: "数字电子技术", s: 1, e: 2, w: range(1,8), loc: "上院" },
            { name: "大学物理（荣誉）（1）", s: 3, e: 4, w: range(1,16), loc: "中院" },
            { name: "电路理论（荣誉）", s: 9, e: 10, w: [1, 3, 5, 7, 9, 11, 13, 15], loc: "上院" },
            { name: "面向人工智能的线性代数", s: 11, e: 12, w: range(1,8), loc: "上院" }
        ],
        5: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: [2, 4, 6, 8, 10, 12, 14, 16], loc: "中院" },
            { name: "篮球", s: 7, e: 8, w: range(1,16), loc: "南区体育馆" }
        ]
    };

    const pxPerMin = 3; 
    const startOfDayMin = 450; 
    const MAX_WEEKS = 16; 
    
    function formatTime(min) {
        let h = Math.floor(min / 60).toString().padStart(2, '0');
        let m = (min % 60).toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function getCurrentWeek(nowObj) {
        const nowAtMidnight = new Date(nowObj.getFullYear(), nowObj.getMonth(), nowObj.getDate());
        const startAtMidnight = new Date(SEMESTER_START_DATE.getFullYear(), SEMESTER_START_DATE.getMonth(), SEMESTER_START_DATE.getDate());
        const diffDays = Math.floor((nowAtMidnight - startAtMidnight) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return 1; 
        
        let calculatedWeek = Math.floor(diffDays / 7) + 1;
        return calculatedWeek > MAX_WEEKS ? MAX_WEEKS : calculatedWeek;
    }

    function getStandardPeriods(s, e) {
        let res = [];
        for(let i = s; i <= e; i++) {
            res.push(classTimes[i-1]);
        }
        return res;
    }

    // --- 主界面渲染 ---
    function renderTimeline() {
        const now = new Date();
        let dayOfWeek = now.getDay();
        if (dayOfWeek === 0) dayOfWeek = 7; 
        const currentWeek = getCurrentWeek(now);
        
        document.getElementById('header-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 星期${['日','一','二','三','四','五','六'][now.getDay()]}`;
        document.getElementById('header-week').innerText = `第 ${currentWeek} 周`;

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = ''; 

        for(let m = 480; m <= 1260; m += 60) {
            let label = document.createElement('div');
            label.className = 'time-label';
            label.innerText = formatTime(m);
            label.style.top = `${(m - startOfDayMin) * pxPerMin}px`;
            timeline.appendChild(label);
        }

        const todaysClasses = schedule[dayOfWeek] || [];
        todaysClasses.forEach(c => {
            if (c.w.includes(currentWeek)) {
                let periods = c.customPeriods || getStandardPeriods(c.s, c.e);
                let startMin = periods[0].start;
                let endMin = periods[periods.length - 1].end;
                
                let block = document.createElement('div');
                block.className = 'block';
                block.style.top = `${(startMin - startOfDayMin) * pxPerMin}px`;
                block.style.height = `${(endMin - startMin) * pxPerMin}px`;
                
                let baseHexColor = getColor(c.name);
                
                let bgHtml = '';
                for(let i = 0; i < periods.length; i++) {
                    let p = periods[i];
                    let pTop = (p.start - startMin) * pxPerMin;
                    let pHeight = (p.end - p.start) * pxPerMin;
                    bgHtml += `<div class="block-bg" style="top:${pTop}px; height:${pHeight}px; background-color:${hexToRgba(baseHexColor, 1)};"></div>`;
                    
                    if (i < periods.length - 1) {
                        let breakStart = p.end;
                        let breakEnd = periods[i+1].start;
                        let breakTop = (breakStart - startMin) * pxPerMin;
                        let breakHeight = (breakEnd - breakStart) * pxPerMin;
                        bgHtml += `<div class="block-bg" style="top:${breakTop}px; height:${breakHeight}px; background-color:${hexToRgba(baseHexColor, 0.35)};"></div>`;
                    }
                }

                const locHtml = c.loc ? `<div class="block-loc"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>${c.loc}</div>` : '';
                const dispPeriod = c.customPeriods ? `${c.s}-${c.e}` : `${c.s}-${c.e}`; // 统一显示

                block.innerHTML = `
                    ${bgHtml}
                    <div class="block-content">
                        <div class="block-time">
                            <span>${formatTime(startMin)} - ${formatTime(endMin)}</span>
                            <span>(第${dispPeriod}节)</span>
                        </div>
                        <div class="block-title">${c.name}</div>
                        ${locHtml}
                    </div>
                `;
                
                const currentMin = now.getHours() * 60 + now.getMinutes();
                if (currentMin >= startMin && currentMin <= endMin) {
                    block.classList.add('active');
                }
                
                timeline.appendChild(block);
            }
        });
    }

    // --- 滚动同步逻辑 ---
    function updateScroll() {
        const now = new Date(); 
        const currentMin = now.getHours() * 60 + now.getMinutes() + (now.getSeconds() / 60);
        const currentY = (currentMin - startOfDayMin) * pxPerMin;
        const screenCenterY = window.innerHeight / 2;
        const translateY = screenCenterY - currentY;
        document.getElementById('timeline').style.transform = `translateY(${translateY}px)`;
    }

    // --- 学期周历网格 ---
    let viewingWeek = 1;
    
    // 渲染具体网格数据的函数
    function populateGridData(week) {
        const grid = document.getElementById('week-grid');
        grid.innerHTML = ''; 

        const days = ['', '一', '二', '三', '四', '五'];
        days.forEach((d, i) => {
            let el = document.createElement('div');
            el.className = 'grid-header';
            el.innerText = d;
            el.style.gridColumn = i + 1;
            el.style.gridRow = 1;
            grid.appendChild(el);
        });

        for(let i = 1; i <= 13; i++) {
            let el = document.createElement('div');
            el.className = 'grid-time';
            el.innerHTML = `${i}<span>${formatTime(classTimes[i-1].start)}<br>${formatTime(classTimes[i-1].end)}</span>`;
            el.style.gridColumn = 1;
            el.style.gridRow = i + 1;
            grid.appendChild(el);
        }

        for(let day = 1; day <= 5; day++) {
            const classes = schedule[day] || [];
            classes.forEach(c => {
                if (c.w.includes(week)) {
                    let el = document.createElement('div');
                    el.className = 'grid-course';
                    el.style.backgroundColor = hexToRgba(getColor(c.name), 1); 
                    el.style.gridColumn = day + 1;
                    el.style.gridRow = `${c.s + 1} / ${c.e + 2}`;
                    
                    const gridLocHtml = c.loc ? `<div class="grid-course-loc">${c.loc}</div>` : '';
                    el.innerHTML = `
                        <div class="grid-course-name">${c.name}</div>
                        ${gridLocHtml}
                    `;
                    grid.appendChild(el);
                }
            });
        }
    }

    // 带动画的翻页执行函数
    function animateGridToWeek(week, direction) {
        const currentWeek = getCurrentWeek(new Date());
        let titleEl = document.getElementById('modal-title-text');
        
        if (week === currentWeek) {
            titleEl.innerText = `第 ${week} 周 (本)`;
            titleEl.style.fontSize = '15px';
        } else {
            titleEl.innerText = `第 ${week} 周`;
            titleEl.style.fontSize = '18px';
        }

        const grid = document.getElementById('week-grid');
        
        // 1. 设置动画状态并滑出
        grid.style.transition = 'transform 0.15s ease-out, opacity 0.15s ease-out';
        grid.style.transform = direction === 'next' ? 'translateX(-30px)' : 'translateX(30px)';
        grid.style.opacity = '0';

        // 2. 等待滑出完毕后，更换数据并瞬间移到另一侧准备滑入
        setTimeout(() => {
            populateGridData(week);
            grid.style.transition = 'none'; // 取消动画
            grid.style.transform = direction === 'next' ? 'translateX(30px)' : 'translateX(-30px)'; // 瞬移到准备进入的一侧
            
            // 强制重绘 (Force reflow)
            void grid.offsetWidth;

            // 3. 恢复动画，向中间滑入
            grid.style.transition = 'transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s ease-in';
            grid.style.transform = 'translateX(0)';
            grid.style.opacity = '1';
        }, 150);
    }

    // --- 交互事件绑定 ---
    const btnOpen = document.getElementById('week-view-btn');
    const btnClose = document.getElementById('close-modal-btn');
    const modal = document.getElementById('week-modal');
    const scrollArea = document.getElementById('modal-body-scroll');

    btnOpen.addEventListener('click', () => {
        viewingWeek = getCurrentWeek(new Date());
        // 打开时不带左右动画，直接渲染
        let titleEl = document.getElementById('modal-title-text');
        titleEl.innerText = `第 ${viewingWeek} 周 (本)`;
        titleEl.style.fontSize = '15px';
        populateGridData(viewingWeek); 
        modal.classList.add('show');
    });

    btnClose.addEventListener('click', () => {
        modal.classList.remove('show');
    });

    document.getElementById('prev-week-btn').addEventListener('click', () => {
        if (viewingWeek > 1) { 
            viewingWeek--; 
            animateGridToWeek(viewingWeek, 'prev'); 
        }
    });
    document.getElementById('next-week-btn').addEventListener('click', () => {
        if (viewingWeek < MAX_WEEKS) { 
            viewingWeek++; 
            animateGridToWeek(viewingWeek, 'next'); 
        } 
    });

    // 屏幕左右滑动切换 (引入了动画)
    let touchStartX = 0;
    scrollArea.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});
    
    scrollArea.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        if (touchStartX - touchEndX > 50) { 
            if (viewingWeek < MAX_WEEKS) { 
                viewingWeek++; 
                animateGridToWeek(viewingWeek, 'next'); 
            }
        } else if (touchEndX - touchStartX > 50) { 
            if (viewingWeek > 1) { 
                viewingWeek--; 
                animateGridToWeek(viewingWeek, 'prev'); 
            }
        }
    }, {passive: true});

    // 初始化
    renderTimeline();
    updateScroll();

    setInterval(updateScroll, 1000); 
    setInterval(renderTimeline, 60000); 

</script>
</body>
</html>
