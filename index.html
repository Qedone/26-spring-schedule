<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨课表(＾∇＾)</title>
    <meta name="apple-mobile-web-app-title" content="墨墨的课表">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --pointer-color: #ff3b30;
            --active-indicator: #007aff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden; 
            height: 100vh;
        }

        /* --- 主界面样式 --- */
        #header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(247, 247, 249, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 20px;
            z-index: 20;
            box-sizing: border-box;
        }
        #header-date { font-size: 14px; color: var(--text-sec); }
        #header-week { font-size: 20px; font-weight: bold; margin-top: 4px; }

        #pointer {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--pointer-color);
            z-index: 10;
            pointer-events: none;
        }
        #pointer::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--pointer-color);
        }

        #timeline {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }
        .time-label {
            position: absolute;
            left: 2%;
            font-size: 12px;
            color: var(--text-sec);
            transform: translateY(-50%);
        }

        /* 课程块优化 */
        .block {
            position: absolute;
            width: 76%;
            left: 17%;
            border-radius: 10px; 
            box-sizing: border-box;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            border: none;
        }
        .block.active {
            box-shadow: inset 4px 0 0 var(--active-indicator), 0 4px 12px rgba(0,0,0,0.05);
        }
        .block-time {
            font-size: 12px;
            color: rgba(0, 0, 0, 0.5);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .block-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            color: #2c2c2e;
        }

        /* --- 悬浮按钮 --- */
        #week-view-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background-color: #ffffff;
            color: #333;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            z-index: 50;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- 本周全览弹窗 --- */
        #week-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #week-modal.show {
            transform: translateY(0);
        }
        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            background: #fff;
        }
        .modal-title { font-size: 18px; font-weight: bold; }
        .close-btn {
            background: #f2f2f7;
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }
        
        /* 网格课表 */
        .modal-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px;
            background: #fcfcfc;
        }
        #week-grid {
            display: grid;
            grid-template-columns: 30px repeat(5, 1fr);
            grid-auto-rows: 50px; 
            gap: 4px;
        }
        .grid-header {
            font-size: 12px;
            color: var(--text-sec);
            text-align: center;
            padding-bottom: 8px;
        }
        .grid-time {
            font-size: 10px;
            color: var(--text-sec);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grid-course {
            border-radius: 6px;
            padding: 6px;
            font-size: 11px;
            font-weight: 500;
            color: #333;
            overflow: hidden;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="header-date">加载中...</div>
        <div id="header-week">加载中...</div>
    </div>

    <div id="pointer"></div>
    <div id="timeline"></div>

    <div id="week-view-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        本周全览
    </div>

    <div id="week-modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title-text">本周全览</div>
            <button class="close-btn" id="close-modal-btn">关闭</button>
        </div>
        <div class="modal-body">
            <div id="week-grid"></div>
        </div>
    </div>

<script>
    // === 核心配置区 ===
    const IS_PREVIEW = false; // 正式版已关闭预览模式
    
    // 已根据截图校准开学第一周的周一日期为 2026年3月2日
    const SEMESTER_START_DATE = new Date('2026-03-02T00:00:00'); 

    // 配色池 (低饱和度清新色彩)
    const pastelColors = ['#eadeeb', '#dceded', '#ebd9e1', '#dae8df', '#f8dfdd', '#fae0d6', '#d6e6dc'];
    const courseColorMap = {};
    let colorIndex = 0;

    function getColor(courseName) {
        if (!courseColorMap[courseName]) {
            courseColorMap[courseName] = pastelColors[colorIndex % pastelColors.length];
            colorIndex++;
        }
        return courseColorMap[courseName];
    }
    
    // 严格核对的时间表
    const classTimes = [
        { start: 480, end: 525 },   // 1
        { start: 535, end: 580 },   // 2
        { start: 600, end: 645 },   // 3
        { start: 655, end: 700 },   // 4
        { start: 720, end: 765 },   // 5
        { start: 775, end: 820 },   // 6
        { start: 840, end: 885 },   // 7
        { start: 895, end: 940 },   // 8
        { start: 960, end: 1005 },  // 9
        { start: 1015, end: 1060 }, // 10
        { start: 1080, end: 1125 }, // 11
        { start: 1135, end: 1180 }, // 12
        { start: 1185, end: 1220 }  // 13 (35 mins)
    ];

    const range = (start, end) => Array.from({length: end - start + 1}, (_, i) => start + i);

    // 严格核对的课表数据
    const schedule = {
        1: [
            { name: "数学分析（荣誉）II", s: 1, e: 2, w: range(1,16) },
            { name: "程序设计原理与方法", s: 3, e: 4, w: range(1,16) },
            { name: "习近平新时代中国特色社会主义思想概论", s: 6, e: 8, w: range(1,16) },
            { name: "面向人工智能的线性代数", s: 9, e: 10, w: range(1,8) }
        ],
        2: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: range(1,16) },
            { name: "数字电子技术", s: 3, e: 4, w: range(1,8) },
            { name: "电路理论（荣誉）", s: 7, e: 8, w: range(1,16) },
            { name: "莎士比亚戏剧赏析", s: 9, e: 10, w: range(1,16) },
            { name: "基础物理实验（荣誉）（1）", s: 11, e: 13, w: range(3,16) }
        ],
        3: [
            { name: "综合英语III", s: 1, e: 2, w: range(1,16) },
            { name: "数学分析（荣誉）II", s: 3, e: 4, w: range(1,16) },
            { name: "形势与政策", s: 9, e: 10, w: [5, 9, 13, 15] }, 
            { name: "程序设计原理与方法", s: 11, e: 12, w: range(1,16) }
        ],
        4: [
            { name: "数字电子技术", s: 1, e: 2, w: range(1,8) },
            { name: "大学物理（荣誉）（1）", s: 3, e: 4, w: range(1,16) },
            { name: "电路理论（荣誉）", s: 9, e: 10, w: [1, 3, 5, 7, 9, 11, 13, 15] },
            { name: "面向人工智能的线性代数", s: 11, e: 12, w: range(1,8) }
        ],
        5: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: [2, 4, 6, 8, 10, 12, 14, 16] },
            { name: "篮球", s: 7, e: 8, w: range(1,16) }
        ]
    };

    const pxPerMin = 3; 
    const startOfDayMin = 450; 
    
    function formatTime(min) {
        let h = Math.floor(min / 60).toString().padStart(2, '0');
        let m = (min % 60).toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function getNow() {
        if (IS_PREVIEW) return new Date('2026-03-02T10:30:00');
        return new Date();
    }

    function getCurrentWeek(nowObj) {
        // 重置时间为当天0点，避免时分秒干扰天数计算
        const nowAtMidnight = new Date(nowObj.getFullYear(), nowObj.getMonth(), nowObj.getDate());
        const startAtMidnight = new Date(SEMESTER_START_DATE.getFullYear(), SEMESTER_START_DATE.getMonth(), SEMESTER_START_DATE.getDate());
        
        const diffTime = nowAtMidnight - startAtMidnight;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) return 1; // 还没开学的话默认展示第一周
        return Math.floor(diffDays / 7) + 1;
    }

    // --- 主界面渲染 ---
    function renderTimeline() {
        const now = getNow();
        let dayOfWeek = now.getDay();
        if (dayOfWeek === 0) dayOfWeek = 7; 
        
        const currentWeek = getCurrentWeek(now);
        
        const previewTag = IS_PREVIEW ? " (预览模式)" : "";
        document.getElementById('header-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 星期${['日','一','二','三','四','五','六'][now.getDay()]}${previewTag}`;
        document.getElementById('header-week').innerText = `第 ${currentWeek} 周`;

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = ''; 

        for(let m = 480; m <= 1260; m += 60) {
            let label = document.createElement('div');
            label.className = 'time-label';
            label.innerText = formatTime(m);
            label.style.top = `${(m - startOfDayMin) * pxPerMin}px`;
            timeline.appendChild(label);
        }

        const todaysClasses = schedule[dayOfWeek] || [];
        todaysClasses.forEach(c => {
            if (c.w.includes(currentWeek)) {
                let startMin = classTimes[c.s - 1].start;
                let endMin = classTimes[c.e - 1].end;
                
                let block = document.createElement('div');
                block.className = 'block';
                block.style.top = `${(startMin - startOfDayMin) * pxPerMin}px`;
                block.style.height = `${(endMin - startMin) * pxPerMin}px`;
                block.style.backgroundColor = getColor(c.name); 
                
                block.innerHTML = `
                    <div class="block-time">
                        <span>${formatTime(startMin)} - ${formatTime(endMin)}</span>
                        <span>(第${c.s}-${c.e}节)</span>
                    </div>
                    <div class="block-title">${c.name}</div>
                `;
                
                const currentMin = now.getHours() * 60 + now.getMinutes();
                if (currentMin >= startMin && currentMin <= endMin) {
                    block.classList.add('active');
                }
                
                timeline.appendChild(block);
            }
        });
    }

    // --- 滚动同步逻辑 ---
    function updateScroll() {
        const now = getNow();
        const realNow = new Date(); 
        const secondsOffset = IS_PREVIEW ? (realNow.getSeconds() / 60) : (now.getSeconds() / 60);
        const currentMin = now.getHours() * 60 + now.getMinutes() + secondsOffset;
        
        const currentY = (currentMin - startOfDayMin) * pxPerMin;
        const screenCenterY = window.innerHeight / 2;
        const translateY = screenCenterY - currentY;
        
        document.getElementById('timeline').style.transform = `translateY(${translateY}px)`;
    }

    // --- 本周全览网格渲染 ---
    function renderWeekGrid() {
        const now = getNow();
        const currentWeek = getCurrentWeek(now);
        const grid = document.getElementById('week-grid');
        grid.innerHTML = ''; 

        const days = ['', '一', '二', '三', '四', '五'];
        days.forEach((d, i) => {
            let el = document.createElement('div');
            el.className = 'grid-header';
            el.innerText = d;
            el.style.gridColumn = i + 1;
            el.style.gridRow = 1;
            grid.appendChild(el);
        });

        for(let i = 1; i <= 13; i++) {
            let el = document.createElement('div');
            el.className = 'grid-time';
            el.innerText = i;
            el.style.gridColumn = 1;
            el.style.gridRow = i + 1;
            grid.appendChild(el);
        }

        for(let day = 1; day <= 5; day++) {
            const classes = schedule[day] || [];
            classes.forEach(c => {
                if (c.w.includes(currentWeek)) {
                    let el = document.createElement('div');
                    el.className = 'grid-course';
                    el.style.backgroundColor = getColor(c.name); 
                    el.style.gridColumn = day + 1;
                    el.style.gridRow = `${c.s + 1} / ${c.e + 2}`;
                    el.innerText = c.name;
                    grid.appendChild(el);
                }
            });
        }
    }

    // --- 交互事件绑定 ---
    const btnOpen = document.getElementById('week-view-btn');
    const btnClose = document.getElementById('close-modal-btn');
    const modal = document.getElementById('week-modal');

    btnOpen.addEventListener('click', () => {
        renderWeekGrid(); 
        modal.classList.add('show');
    });

    btnClose.addEventListener('click', () => {
        modal.classList.remove('show');
    });

    // 初始化
    renderTimeline();
    updateScroll();

    setInterval(updateScroll, 1000); 
    setInterval(renderTimeline, 60000); 

</script>
</body>
</html>
