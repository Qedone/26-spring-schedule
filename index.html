<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>实时课表滚盘</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --class-bg: #ffffff;
            --class-border: #e5e5ea;
            --active-color: #007aff;
            --pointer-color: #ff3b30;
            --px-per-min: 3px; /* 每分钟对应的像素高度 */
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--text-main);
            overflow: hidden; /* 禁止原生滚动，完全由JS接管位置 */
            height: 100vh;
        }
        /* 左侧固定的指针 */
        #pointer {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--pointer-color);
            z-index: 10;
            pointer-events: none;
        }
        #pointer::before {
            content: '';
            position: absolute;
            left: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--pointer-color);
        }
        /* 时间轴容器 */
        #timeline {
            position: absolute;
            width: 100%;
            transition: transform 0.1s linear;
        }
        /* 每天的课程块 */
        .block {
            position: absolute;
            width: 80%;
            left: 15%;
            border-radius: 12px;
            background-color: var(--class-bg);
            border: 1px solid var(--class-border);
            box-sizing: border-box;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .block.active {
            border-color: var(--active-color);
            box-shadow: 0 4px 12px rgba(0,122,255,0.15);
        }
        .block-time {
            font-size: 12px;
            color: var(--text-sec);
            margin-bottom: 4px;
        }
        .block-title {
            font-size: 16px;
            font-weight: 600;
        }
        /* 左侧时间刻度 */
        .time-label {
            position: absolute;
            left: 2%;
            font-size: 12px;
            color: var(--text-sec);
            transform: translateY(-50%);
        }
        /* 顶部日期信息 */
        #header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(245, 245, 247, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            z-index: 20;
            box-sizing: border-box;
            border-bottom: 1px solid var(--class-border);
        }
        #header-date { font-size: 14px; color: var(--text-sec); }
        #header-week { font-size: 20px; font-weight: bold; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="header-date">加载中...</div>
        <div id="header-week">加载中...</div>
    </div>

    <div id="pointer"></div>
    <div id="timeline"></div>

<script>
    // --- 核心配置 ---
    // 请将这里的日期修改为你本学期第一周周一的日期
    const SEMESTER_START_DATE = new Date('2026-03-02T00:00:00'); 
    
    // 每节课的时间定义 (单位：距离0点0分的分钟数)
    const classTimes = [
        { start: 480, end: 525 },   // 1: 08:00 - 08:45 (休息10分)
        { start: 535, end: 580 },   // 2: 08:55 - 09:40 (休息20分)
        { start: 600, end: 645 },   // 3: 10:00 - 10:45 (休息10分)
        { start: 655, end: 700 },   // 4: 10:55 - 11:40 (休息20分)
        { start: 720, end: 765 },   // 5: 12:00 - 12:45 (休息10分)
        { start: 775, end: 820 },   // 6: 12:55 - 13:40 (休息20分)
        { start: 840, end: 885 },   // 7: 14:00 - 14:45 (休息10分)
        { start: 895, end: 940 },   // 8: 14:55 - 15:40 (休息20分)
        { start: 960, end: 1005 },  // 9: 16:00 - 16:45 (休息10分)
        { start: 1015, end: 1060 }, // 10: 16:55 - 17:40 (休息20分)
        { start: 1080, end: 1125 }, // 11: 18:00 - 18:45 (休息10分)
        { start: 1135, end: 1180 }, // 12: 18:55 - 19:40 (休息5分)
        { start: 1185, end: 1220 }  // 13: 19:45 - 20:20 
    ];

    // 生成范围数组的工具函数
    const range = (start, end) => Array.from({length: end - start + 1}, (_, i) => start + i);

    // 课表数据提取 (1=周一, 5=周五)
    const schedule = {
        1: [
            { name: "数学分析（荣誉）II", s: 1, e: 2, w: range(1,16) },
            { name: "程序设计原理与方法", s: 3, e: 4, w: range(1,16) },
            { name: "习近平新时代中国特色社会主义思想概论", s: 6, e: 8, w: range(1,16) },
            { name: "面向人工智能的线性代数", s: 9, e: 10, w: range(1,8) }
        ],
        2: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: range(1,16) },
            { name: "数字电子技术", s: 3, e: 4, w: range(1,8) },
            { name: "电路理论（荣誉）", s: 7, e: 8, w: range(1,16) },
            { name: "莎士比亚戏剧赏析", s: 9, e: 10, w: range(1,16) },
            { name: "基础物理实验（荣誉）（1）", s: 11, e: 13, w: range(3,16) }
        ],
        3: [
            { name: "综合英语III", s: 1, e: 2, w: range(1,16) },
            { name: "数学分析（荣誉）II", s: 3, e: 4, w: range(1,16) },
            { name: "形势与政策", s: 9, e: 10, w: [5,9,13,14,15].filter(w => w === 5 || w === 9 || w % 2 !== 0) }, // 13-15周单
            { name: "程序设计原理与方法", s: 11, e: 12, w: range(1,16) }
        ],
        4: [
            { name: "数字电子技术", s: 1, e: 2, w: range(1,8) },
            { name: "大学物理（荣誉）（1）", s: 3, e: 4, w: range(1,16) },
            { name: "电路理论（荣誉）", s: 9, e: 10, w: [1,3,5,7,9,11,13,15] },
            { name: "面向人工智能的线性代数", s: 11, e: 12, w: range(1,8) }
        ],
        5: [
            { name: "大学物理（荣誉）（1）", s: 1, e: 2, w: [2,4,6,8,10,12,14,16] },
            { name: "篮球", s: 7, e: 8, w: range(1,16) }
        ]
    };

    // --- 逻辑处理 ---
    const pxPerMin = 3; // 缩放比例
    const startOfDayMin = 450; // 滚盘起点: 07:30
    
    function formatTime(min) {
        let h = Math.floor(min / 60).toString().padStart(2, '0');
        let m = (min % 60).toString().padStart(2, '0');
        return `${h}:${m}`;
    }

    function getCurrentWeek() {
        const now = new Date();
        const diffTime = Math.abs(now - SEMESTER_START_DATE);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return Math.floor(diffDays / 7) + 1;
    }

    function renderTimeline() {
        const now = new Date();
        let dayOfWeek = now.getDay();
        if (dayOfWeek === 0) dayOfWeek = 7; // 周日转为7
        
        const currentWeek = getCurrentWeek();
        
        document.getElementById('header-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 星期${['日','一','二','三','四','五','六'][now.getDay()]}`;
        document.getElementById('header-week').innerText = `第 ${currentWeek} 周`;

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = ''; // 清空重新渲染

        // 绘制时间刻度 (从08:00到21:00)
        for(let m = 480; m <= 1260; m += 60) {
            let label = document.createElement('div');
            label.className = 'time-label';
            label.innerText = formatTime(m);
            label.style.top = `${(m - startOfDayMin) * pxPerMin}px`;
            timeline.appendChild(label);
        }

        // 绘制当天的课程
        const todaysClasses = schedule[dayOfWeek] || [];
        todaysClasses.forEach(c => {
            // 检查该课程今天是否上（周数匹配）
            if (c.w.includes(currentWeek)) {
                let startMin = classTimes[c.s - 1].start;
                let endMin = classTimes[c.e - 1].end;
                
                let block = document.createElement('div');
                block.className = 'block';
                block.style.top = `${(startMin - startOfDayMin) * pxPerMin}px`;
                block.style.height = `${(endMin - startMin) * pxPerMin}px`;
                
                block.innerHTML = `
                    <div class="block-time">${formatTime(startMin)} - ${formatTime(endMin)} (第${c.s}-${c.e}节)</div>
                    <div class="block-title">${c.name}</div>
                `;
                
                // 检查是否正在上这门课
                const currentMin = now.getHours() * 60 + now.getMinutes();
                if (currentMin >= startMin && currentMin <= endMin) {
                    block.classList.add('active');
                }
                
                timeline.appendChild(block);
            }
        });
    }

    function updateScroll() {
        const now = new Date();
        const currentMin = now.getHours() * 60 + now.getMinutes() + (now.getSeconds() / 60);
        
        // 计算当前时间在时间轴上的绝对 Y 坐标
        const currentY = (currentMin - startOfDayMin) * pxPerMin;
        
        // 屏幕中心高度
        const screenCenterY = window.innerHeight / 2;
        
        // 移动时间轴，让 currentY 对准屏幕中心
        const translateY = screenCenterY - currentY;
        
        document.getElementById('timeline').style.transform = `translateY(${translateY}px)`;
    }

    // 初始化
    renderTimeline();
    updateScroll();

    // 实时更新 (每秒更新一次位置，每分钟检查一次课程状态)
    setInterval(updateScroll, 1000); // 1秒更新滚动条，保证平滑
    setInterval(renderTimeline, 60000); // 1分钟更新一次UI状态（解决跨天/跨周）

</script>
</body>
</html>
